# Único workflow de release: compila .exe + latest.json Tauri (updater automático).
# OTA (avisos en app): releases/latest.json en rama main — subir con publicar-actualizacion / _git-push-latest.bat
# NO usar otro workflow en tag v* (evita doble compilación y sobrescribir latest.json).
name: Tauri Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Versión desde tag
        run: node scripts/sync-version-from-tag.mjs "${{ github.ref_name }}"

      - name: Sync frontend app → src
        run: node scripts/sync-frontend-to-src.mjs

      - name: Install npm dependencies
        run: npm ci

      - name: Compilar instalador y publicar release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Crozzo POS ${{ github.ref_name }}
          releaseBody: |
            Instalador Windows (NSIS) y actualización automática silenciosa.
            Avisos crítica/opcional: `releases/latest.json` en rama **main** (canal OTA).
          releaseDraft: false
          prerelease: false
          args: --target x86_64-pc-windows-msvc
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Verificar latest.json (setup.exe, no MSI)
        run: node scripts/verify-release-updater-json.mjs "${{ github.ref_name }}"
