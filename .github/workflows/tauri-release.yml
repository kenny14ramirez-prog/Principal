# Release multiplataforma: Windows + macOS + Android (APK) + latest.json Tauri
# OTA tablets/navegador: releases/registry.json en rama main
name: Tauri Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            label: Windows x64
            rust_target: x86_64-pc-windows-msvc
            args: '--target x86_64-pc-windows-msvc'
            android: false
          - platform: macos-latest
            label: macOS Apple Silicon
            rust_target: aarch64-apple-darwin
            args: '--target aarch64-apple-darwin'
            android: false
          - platform: macos-latest
            label: macOS Intel
            rust_target: x86_64-apple-darwin
            args: '--target x86_64-apple-darwin'
            android: false
          - platform: ubuntu-22.04
            label: Android ARM64 (APK)
            rust_target: aarch64-linux-android
            args: '--target aarch64'
            android: true

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java (Android)
        if: matrix.android
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        if: matrix.android
        uses: android-actions/setup-android@v3

      - name: Cache Gradle (Android)
        if: matrix.android
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            src-tauri/gen/android/.gradle
          key: ${{ runner.os }}-gradle-android-${{ hashFiles('src-tauri/**/*.rs', 'src-tauri/tauri.android.conf.json', 'package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-gradle-android-

      - name: Setup Android NDK
        if: matrix.android
        uses: nttld/setup-ndk@v1
        id: android-ndk
        with:
          ndk-version: r26d

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.android && 'aarch64-linux-android,armv7-linux-androideabi,x86_64-linux-android' || matrix.rust_target }}

      - name: Versión desde tag
        run: node scripts/sync-version-from-tag.mjs "${{ github.ref_name }}"

      - name: Sync frontend app → src
        run: node scripts/sync-frontend-to-src.mjs

      - name: Install npm dependencies
        run: npm ci

      - name: Init proyecto Android
        if: matrix.android
        env:
          CI: true
          NDK_HOME: ${{ steps.android-ndk.outputs.ndk-path }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: npx tauri android init --ci --skip-targets-install

      - name: Compilar ${{ matrix.label }} y publicar release
        if: ${{ !matrix.android }}
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          NDK_HOME: ${{ matrix.android && steps.android-ndk.outputs.ndk-path || '' }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Crozzo POS ${{ github.ref_name }}
          releaseBody: |
            Instaladores multiplataforma Crozzo POS.

            | Plataforma | Artefacto | Uso |
            |------------|-----------|-----|
            | Windows | `Proyecto_*_x64-setup.exe` | PC caja / mostrador |
            | macOS Apple Silicon | `.dmg` aarch64 | Mac M1/M2/M3 |
            | macOS Intel | `.dmg` x86_64 | Mac Intel |
            | Android (tablets) | `.apk` ARM64 | Instalar en tablet (permitir orígenes desconocidos o MDM) |

            Actualización automática Tauri: Windows y Mac (desde la app).
            Tablets en navegador: avisos vía `registry.json` en rama **main**.
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
          includeUpdaterJson: true
          updaterJsonPreferNsis: true

      - name: Compilar APK Android
        if: matrix.android
        env:
          CI: true
          NDK_HOME: ${{ steps.android-ndk.outputs.ndk-path }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
        run: npx tauri android build --target aarch64

      - name: Subir APK al release de GitHub
        if: matrix.android
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.ref_name }}"
          for i in $(seq 1 20); do
            if gh release view "$TAG" >/dev/null 2>&1; then break; fi
            echo "Esperando release $TAG ($i/20)..."
            sleep 30
          done
          APK=$(find src-tauri/gen/android -name '*.apk' -type f 2>/dev/null | head -1)
          if [ -z "$APK" ]; then
            echo "No se encontró APK en src-tauri/gen/android"
            find src-tauri/gen/android -type f 2>/dev/null || true
            exit 1
          fi
          gh release upload "$TAG" "$APK" --clobber
          echo "APK subido: $APK"

      - name: Verificar latest.json y artefactos del release
        if: matrix.label == 'Windows x64'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/verify-release-updater-json.mjs "${{ github.ref_name }}"
