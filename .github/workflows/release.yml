name: Publicar Crozzo POS
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - name: Sincronizar versión desde tag
        shell: pwsh
        run: node scripts/sync-version-from-tag.mjs "${{ github.ref_name }}"
      - run: npm install
      - name: Build & Release
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Crozzo POS ${{ github.ref_name }}"
          releaseBody: "${{ github.event.head_commit.message }}"
          releaseDraft: false
          prerelease: false
      - name: Generar y subir latest.json (updater)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
        run: |
          $tag = "${{ github.ref_name }}"
          $ver = $tag -replace '^v',''
          $msg = "${{ github.event.head_commit.message }}"
          $notes = if ($env:RELEASE_NOTES) { $env:RELEASE_NOTES } else { $msg }
          $type = "optional"
          if ($msg -match '\[CRITICAL\]|🔥|critico|crítico|critical') { $type = "critical" }
          if ($env:UPDATE_TYPE) { $type = $env:UPDATE_TYPE }

          node scripts/generate-release-json.mjs $ver $notes $type

          $max = 18
          $ok = $false
          for ($i = 1; $i -le $max; $i++) {
            gh release view $tag 2>$null
            if ($LASTEXITCODE -eq 0) { $ok = $true; break }
            Write-Host "Esperando release $tag ($i/$max)..."
            Start-Sleep -Seconds 10
          }
          if (-not $ok) {
            Write-Host "Release no encontrado; creando $tag"
            gh release create $tag --title "Crozzo POS $tag" --notes $notes
          }

          gh release upload $tag latest.json --clobber
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          Write-Host "latest.json subido a release $tag"
