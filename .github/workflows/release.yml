name: Publicar Crozzo POS
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - uses: dtolnay/rust-toolchain@stable
      - run: npm install
      - name: Build & Release
        id: tauri_build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          tagName: v__VERSION__
          releaseName: "Crozzo POS v__VERSION__"
          releaseBody: "Actualización automática del sistema."
          releaseDraft: false
          prerelease: false
      - name: Generar latest.json (updater)
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $ver = "${{ github.ref_name }}" -replace '^v',''
          $notes = if ($env:RELEASE_NOTES) { $env:RELEASE_NOTES } else { "Actualización Crozzo POS v$ver" }
          $type = if ($env:UPDATE_TYPE) { $env:UPDATE_TYPE } else { "optional" }
          if ($notes -match '🔥|critico|crítico|critical|\[CRITICAL\]') { $type = "critical" }
          node scripts/generate-release-json.mjs $ver $notes $type
          gh release upload ${{ github.ref_name }} latest.json --clobber
